<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backup</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:sans-serif;padding:16px}
h2{color:#3fb950;margin-bottom:16px;font-size:20px}
.stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.num{font-size:24px;font-weight:700;color:#58a6ff}
.lbl{color:#8b949e;font-size:14px}
button{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:sans-serif}
.g{background:#3fb950;color:white}
.b{background:#58a6ff;color:white}
textarea{width:100%;height:180px;background:#161b22;color:#e6edf3;border:1px solid #3fb950;border-radius:8px;padding:10px;font-size:10px;font-family:monospace;margin-bottom:10px;display:none}
.msg{color:#3fb950;font-size:13px;margin-bottom:10px;display:none;font-weight:600}
.warn{background:#161b22;border:1px solid #d29922;border-radius:8px;padding:12px;color:#d29922;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<h2>🚨 Nood Backup</h2>
<div class="warn">⚠️ Kopieer de tekst na export en plak in je Notes app of mail naar jezelf!</div>
<div id="stats"></div>
<button class="g" onclick="toonData()">⬇️ Exporteer & Toon Data</button>
<div class="msg" id="msg">✅ Data geladen! Druk lang op tekstvak → Alles selecteren → Kopiëren</div>
<textarea id="ta" readonly></textarea>
<button class="b" id="kopBtn" onclick="kopieer()" style="display:none">📋 Kopieer alles</button>

<script>
// Toon statistieken
var s=JSON.parse(localStorage.getItem('sessions')||'[]');
var l=JSON.parse(localStorage.getItem('lichaam')||'[]');
var b=JSON.parse(localStorage.getItem('bibliotheek')||'[]');
var t=JSON.parse(localStorage.getItem('templates')||'[]');
var d=localStorage.getItem('doelGewicht');

var st=document.getElementById('stats');
[['Trainingen',s.length],['Gewicht/Slaap',l.length],['Oefeningen',b.length],['Templates',t.length]].forEach(function(x){
  st.innerHTML+='<div class="stat"><div class="lbl">'+x[0]+'</div><div class="num">'+x[1]+'</div></div>';
});

function toonData(){
  var data=JSON.stringify({versie:4,datum:new Date().toISOString(),sessions:s,lichaam:l,bibliotheek:b,templates:t,doelGewicht:d?JSON.parse(d):null},null,2);
  var ta=document.getElementById('ta');
  ta.value=data;
  ta.style.display='block';
  document.getElementById('msg').style.display='block';
  document.getElementById('kopBtn').style.display='block';
  ta.focus();
  ta.setSelectionRange(0,data.length);
}

function kopieer(){
  var ta=document.getElementById('ta');
  ta.focus();
  ta.setSelectionRange(0,ta.value.length);
  try{
    document.execCommand('copy');
    document.getElementById('kopBtn').textContent='✅ Gekopieerd! Plak nu in Notes';
  }catch(e){
    alert('Druk lang op de tekst → Alles selecteren → Kopiëren');
  }
}
</script>
</body>
</html>
